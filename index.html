<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的書籤導航</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>我的書籤導航</h1>
            <p class="subtitle">快速存取常用網站</p>
        </header>

        <main>
            <section class="category">
                <h2>常用工具</h2>
                <div class="links">
                    <a href="https://www.google.com" target="_blank" class="link-card">
                        <span class="icon">🔍</span>
                        <span class="name">Google</span>
                    </a>
                    <a href="https://github.com" target="_blank" class="link-card">
                        <span class="icon">💻</span>
                        <span class="name">GitHub</span>
                    </a>
                    <a href="https://www.youtube.com" target="_blank" class="link-card">
                        <span class="icon">📺</span>
                        <span class="name">YouTube</span>
                    </a>
                </div>
            </section>

            <section class="category">
                <h2>社群媒體</h2>
                <div class="links">
                    <a href="https://www.facebook.com" target="_blank" class="link-card">
                        <span class="icon">📘</span>
                        <span class="name">Facebook</span>
                    </a>
                    <a href="https://www.instagram.com" target="_blank" class="link-card">
                        <span class="icon">📸</span>
                        <span class="name">Instagram</span>
                    </a>
                </div>
            </section>

            <section class="category">
                <h2>學習資源</h2>
                <div class="links">
                    <a href="https://www.wikipedia.org" target="_blank" class="link-card">
                        <span class="icon">📚</span>
                        <span class="name">Wikipedia</span>
                    </a>
                    <a href="https://www.coursera.org" target="_blank" class="link-card">
                        <span class="icon">🎓</span>
                        <span class="name">Coursera</span>
                    </a>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 我的書籤導航</p>
        </footer>
    </div>
</body>
</html>
