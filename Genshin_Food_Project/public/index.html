<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特美食札記</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f1e9; padding: 20px; }
        .form-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .form-box input, .form-box select, .form-box textarea { width: 100%; margin: 5px 0 15px; padding: 8px; box-sizing: border-box; }
        
        #displayArea { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .food-card { background: white; padding: 15px; border-radius: 10px; display: flex; align-items: center; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .food-card img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 12px; }
        .category-tag { background: #f0e6d2; color: #84643a; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🍴 提瓦特美食札記</h1>
    <div class="form-box">
        <input type="text" id="name" placeholder="料理名稱">
        <select id="category">
            <option value="主食">主食</option>
            <option value="點心">點心</option>
            <option value="飲品">飲品</option>
            <option value="水果">水果</option>
        </select>
        <textarea id="intro" placeholder="簡單介紹一下..."></textarea>
        <input type="file" id="image" accept="image/*">
        <button onclick="upload()" style="width:100%; padding:10px; background:#d3a056; color:white; border:none; border-radius:5px; cursor:pointer;">存入圖鑑</button>
    </div>

    <div id="displayArea"></div>

    <script>
        async function upload() {
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('intro', document.getElementById('intro').value);
            formData.append('foodImage', document.getElementById('image').files[0]);

            await fetch('/add-food', { method: 'POST', body: formData });
            location.reload();
        }

        async function remove(id) {
            if(!confirm('確定要刪除這道料理嗎？')) return;
            await fetch('/delete-food', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            location.reload();
        }

        async function load() {
            const res = await fetch('/get-foods');
            const data = await res.json();
            const area = document.getElementById('displayArea');
            data.forEach(item => {
                area.innerHTML += `
                    <div class="food-card">
                        <button class="delete-btn" onclick="remove(${item.id})">刪除</button>
                        <img src="${item.image}">
                        <div>
                            <span class="category-tag">${item.category}</span><br>
                            <strong>${item.name}</strong>
                            <p style="font-size:12px; color:gray; margin:5px 0;">${item.intro}</p>
                        </div>
                    </div>`;
            });
        }
        load();
    </script>
</body>
</html>
